name: Sync with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Nezreka/SoulSync.git 2>/dev/null || true

      - name: Fetch upstream changes
        run: |
          git fetch upstream

      - name: Check for updates
        id: check
        run: |
          # Check if upstream has new commits
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
            echo "Local: $LOCAL"
            echo "Upstream: $UPSTREAM"
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
            echo "Already up to date with upstream"
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.updates_available == 'true'
        run: |
          if ! git merge upstream/main --no-edit --no-commit 2>/tmp/merge_error; then
            echo "Merge conflicts detected, attempting rebase..."
            git merge --abort || true
            if ! git rebase upstream/main; then
              echo "Rebase failed, aborting rebase..."
              git rebase --abort
              echo "conflict=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          git push origin main || echo "Push failed, may already be up to date"